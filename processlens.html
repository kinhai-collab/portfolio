function FlowNode({ step, isSelected, onClick }) {
  const cfg = statusConfig[step.status] || statusConfig.covered;
  return (
    <div onClick={onClick} style={{
      cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 6,
      padding: "12px 10px", width: 110, flexShrink: 0,
      background: isSelected ? cfg.bg : "#fff",
      border: `2px solid ${isSelected ? cfg.color : cfg.border}`,
      borderRadius: 12, transition: "all 0.15s",
      boxShadow: isSelected ? `0 0 0 3px ${cfg.color}22` : "0 1px 3px rgba(0,0,0,0.04)",
      position: "relative",
    }}>
      {step.verified === false && (
        <div style={{ position: "absolute", top: -6, right: -6, width: 16, height: 16, borderRadius: "50%", background: "#f59e0b", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, color: "#fff", fontWeight: 700, border: "2px solid #fff" }}>!</div>
      )}
      <div style={{ width: 28, height: 28, borderRadius: "50%", background: cfg.bg, border: `2px solid ${cfg.color}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 700, color: cfg.color }}>{cfg.icon}</div>
      <div style={{ fontSize: 10, fontWeight: 600, color: "#334155", textAlign: "center", lineHeight: 1.3, minHeight: 26 }}>{step.name}</div>
      <div style={{ fontSize: 8, fontWeight: 600, color: cfg.color, letterSpacing: 0.5, textTransform: "uppercase" }}>{cfg.label}</div>
    </div>
  );
}

function FlowArrow() {
  return (
    <div style={{ display: "flex", alignItems: "center", flexShrink: 0, width: 28, justifyContent: "center" }}>

      <div style={{ width: 0, height: 0, borderTop: "4px solid transparent", borderBottom: "4px solid transparent", borderLeft: "6px solid #cbd5e1" }} />
    </div>
  );
}

function UploadZone({ title, description, icon, files, onUpload, columns, loading }) {
  const [dragOver, setDragOver] = useState(false);
  const inputRef = useRef(null);
  const handleFiles = useCallback((fl) => { Array.from(fl).forEach(f => onUpload(f)); }, [onUpload]);
  return (
    <div style={{ flex: 1, background: "#fff", borderRadius: 12, border: "1px solid #e2e8f0", overflow: "hidden" }}>
      <div style={{ padding: "16px 20px", borderBottom: "1px solid #f1f5f9", display: "flex", alignItems: "center", gap: 10 }}>
        <span style={{ fontSize: 18 }}>{icon}</span>
        <div>
          <div style={{ fontSize: 14, fontWeight: 600, color: "#0f172a" }}>{title}</div>
          <div style={{ fontSize: 11, color: "#94a3b8" }}>{description}</div>
        </div>
      </div>
      <div onClick={() => inputRef.current?.click()}
        onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
        onDragLeave={() => setDragOver(false)}
        onDrop={(e) => { e.preventDefault(); setDragOver(false); handleFiles(e.dataTransfer.files); }}
        style={{ margin: "12px 16px", padding: "20px", borderRadius: 10, border: `2px dashed ${dragOver ? "#4f46e5" : "#e2e8f0"}`, background: dragOver ? "#eef2ff" : "#f8fafc", textAlign: "center", cursor: "pointer", transition: "all 0.15s" }}>
        <input ref={inputRef} type="file" accept="image/*,.pdf" multiple style={{ display: "none" }} onChange={(e) => handleFiles(e.target.files)} />
        {loading ? (
          <div style={{ fontSize: 13, color: "#4f46e5", fontWeight: 500 }}>⏳ Analyzing with Claude Haiku...</div>
        ) : (<>
          <div style={{ fontSize: 22, marginBottom: 4 }}>📄</div>
          <div style={{ fontSize: 12, fontWeight: 500, color: "#64748b" }}>Drop files here or click to upload</div>
          <div style={{ fontSize: 10, color: "#94a3b8", marginTop: 2 }}>PNG, JPEG, PDF</div>
        </>)}
      </div>
      <div style={{ padding: "0 16px 16px" }}>
        {files.length > 0 && (<>
          <div style={{ fontSize: 10, fontWeight: 600, color: "#94a3b8", letterSpacing: 1, marginBottom: 8, textTransform: "uppercase" }}>Ingested</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {files.map((f, i) => (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 12px", background: "#f8fafc", borderRadius: 8, fontSize: 12 }}>
                <span style={{ fontSize: 14 }}>📋</span>
                <span style={{ flex: 1, fontWeight: 500, color: "#334155", fontSize: 11 }}>{f.name}</span>
                {columns.map((col, ci) => (
                  <span key={ci} style={{ fontSize: 10, color: "#64748b", padding: "2px 8px", background: "#e2e8f0", borderRadius: 6 }}>{col.render(f)}</span>
                ))}
                <span style={{ fontSize: 10, fontWeight: 600, color: "#16a34a", padding: "2px 8px", background: "#f0fdf4", borderRadius: 6 }}>{f.status}</span>
              </div>
            ))}
          </div>
        </>)}
      </div>
    </div>
  );
}

function EditableStep({ step, onUpdate }) {
  const [editing, setEditing] = useState(false);
  const [name, setName] = useState(step.name);
  const [ws, setWs] = useState(step.workstream || "");
  if (!editing) return <button onClick={() => setEditing(true)} style={{ fontSize: 10, color: "#4f46e5", background: "none", border: "none", cursor: "pointer", padding: 0, textDecoration: "underline" }}>Edit step</button>;
  return (
    <div style={{ display: "flex", gap: 8, alignItems: "center", marginTop: 8 }}>
      <input value={name} onChange={e => setName(e.target.value)} style={{ fontSize: 12, padding: "4px 8px", border: "1px solid #cbd5e1", borderRadius: 6, flex: 1 }} />
      <select value={ws} onChange={e => setWs(e.target.value)} style={{ fontSize: 11, padding: "4px 6px", border: "1px solid #cbd5e1", borderRadius: 6 }}>
        {WORKSTREAMS.map(w => <option key={w} value={w}>{w}</option>)}
      </select>
      <button onClick={() => { onUpdate({ ...step, name, workstream: ws }); setEditing(false); }} style={{ fontSize: 11, padding: "4px 10px", background: "#4f46e5", color: "#fff", border: "none", borderRadius: 6, cursor: "pointer" }}>Save</button>
      <button onClick={() => { setName(step.name); setWs(step.workstream); setEditing(false); }} style={{ fontSize: 11, padding: "4px 10px", background: "#f1f5f9", color: "#64748b", border: "none", borderRadius: 6, cursor: "pointer" }}>Cancel</button>
    </div>
  );
}

// ─── MAIN ───
function App() {
  const [activeTab, setActiveTab] = useState("analysis");
  const [selected, setSelected] = useState(3);
  const [l4Files, setL4Files] = useState(INITIAL_L4_FILES);
  const [s4Files, setS4Files] = useState(INITIAL_S4_FILES);
  const [l4Loading, setL4Loading] = useState(false);
  const [s4Loading, setS4Loading] = useState(false);
  const [processFlows, setProcessFlows] = useState(INITIAL_FLOWS);
  const [activeFlow, setActiveFlow] = useState(1);
  const [analyzing, setAnalyzing] = useState(false);
  const [syncing, setSyncing] = useState(false);
  const [error, setError] = useState(null);

  const handleL4Upload = useCallback(async (file) => {
    setL4Loading(true); setError(null);
    try {
      // Simulated analysis for portfolio demo
      await new Promise(r => setTimeout(r, 2500));
      const ws = "EWM";
      const analyzedSteps = [
        { id: 1, name: "Process Start", workstream: ws, status: "covered", detail: "Standard SAP EWM functionality — fully covered.", s4Module: "EWM", verified: undefined },
        { id: 2, name: "Data Capture", workstream: ws, status: "partial", detail: "Requires additional configuration for GxP compliance.", s4Module: "EWM + QM", resolution: "Configuration required", verified: undefined },
        { id: 3, name: "Cross-System Update", workstream: ws, status: "cross-boundary", detail: "This step depends on Finance module posting. Timing dependency must be validated.", crossRef: "Finance → FI-Posting-L4", severity: "medium", s4Module: "FI-MM", verified: false, testCase: { id: "TC-XF-NEW", text: "Validate cross-system update completes within SLA", teams: ["Finance", "EWM"], priority: "P2" } },
      ];
      const newFlow = { id: Date.now(), name: file.name.replace(/\.[^.]+$/, ""), workstream: ws, steps: analyzedSteps, fileName: file.name, date: new Date().toISOString().split("T")[0] };
      setProcessFlows(prev => [...prev, newFlow]);
      setActiveFlow(newFlow.id);
      setL4Files(prev => [...prev, { name: file.name, workstream: ws, steps: analyzedSteps.length, status: "Analyzed", date: newFlow.date }]);
      setActiveTab("analysis"); setSelected(null);
    } catch (err) { setError("Analysis failed: " + (err.message || "Unknown error")); }
    finally { setL4Loading(false); }
  }, []);

  const handleS4Upload = useCallback(async (file) => {
    setS4Loading(true);
    await new Promise(r => setTimeout(r, 1500));
    setS4Files(prev => [...prev, { name: file.name, module: "Custom", chunks: Math.floor(Math.random() * 800) + 200, status: "Indexed" }]);
    setS4Loading(false);
  }, []);

  const handleSync = useCallback(async () => {
    setSyncing(true);
    const allWorkstreams = new Set(processFlows.map(f => f.workstream));
    setProcessFlows(prev => prev.map(flow => ({
      ...flow,
      steps: flow.steps.map(step => {
        if (step.status !== "cross-boundary") return step;
        const target = step.crossRef?.split("→")[0]?.trim() || "";
        return { ...step, verified: allWorkstreams.has(target) };
      }),
    })));
    await new Promise(r => setTimeout(r, 1200));
    setSyncing(false);
  }, [processFlows]);

  const handleStepUpdate = useCallback((flowId, updatedStep) => {
    setProcessFlows(prev => prev.map(flow => flow.id !== flowId ? flow : { ...flow, steps: flow.steps.map(s => s.id === updatedStep.id ? updatedStep : s) }));
  }, []);

  const currentFlow = processFlows.find(f => f.id === activeFlow);
  const selectedStep = currentFlow?.steps.find(s => s.id === selected);
  const allTestCases = processFlows.flatMap(f => f.steps.filter(s => s.testCase).map(s => ({ ...s.testCase, stepName: s.name, status: s.status, flowName: f.name, workstream: f.workstream })));
  const wsCoverage = WORKSTREAMS.map(ws => ({
    ws,
    l4s: processFlows.filter(f => f.workstream === ws).length,
    s4Docs: s4Files.filter(f => f.module === ws || f.module === "All" || f.module === "QM").length,
    status: processFlows.some(f => f.workstream === ws) && s4Files.some(f => f.module === ws || f.module === "All") ? "Ready" : processFlows.some(f => f.workstream === ws) || s4Files.some(f => f.module === ws) ? "Partial" : "Missing",
  }));

  const unverifiedCount = processFlows.reduce((sum, f) => sum + f.steps.filter(s => s.verified === false).length, 0);

  return (
    <div style={{ fontFamily: "'DM Sans', 'Helvetica Neue', sans-serif", background: "#f1f5f9", minHeight: "100vh" }}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

      {/* Top Bar */}
      <div style={{ background: "#fff", borderBottom: "1px solid #e2e8f0", padding: "14px 32px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="7" fill="#4f46e5"/><path d="M8 14h12M14 8v12" stroke="#fff" strokeWidth="2.5" strokeLinecap="round"/></svg>
          <span style={{ fontSize: 16, fontWeight: 700, color: "#0f172a" }}>ProcessLens</span>
          <span style={{ fontSize: 11, color: "#94a3b8", marginLeft: 4 }}>L4 Gap Analyzer</span>
        </div>
        <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
          {[
            { id: "knowledge", label: "Knowledge Base" },
            { id: "analysis", label: "Gap Analysis" },
            { id: "tests", label: `Test Cases` },
          ].map(tab => (
            <button key={tab.id} onClick={() => setActiveTab(tab.id)} style={{
              padding: "6px 16px", fontSize: 12, fontWeight: 600,
              background: activeTab === tab.id ? "#4f46e5" : "transparent",
              color: activeTab === tab.id ? "#fff" : "#64748b",
              border: "none", borderRadius: 8, cursor: "pointer", position: "relative",
            }}>
              {tab.label}
              {tab.id === "tests" && allTestCases.length > 0 && (
                <span style={{ marginLeft: 6, fontSize: 10, padding: "1px 6px", background: activeTab === tab.id ? "rgba(255,255,255,0.2)" : "#e2e8f0", borderRadius: 8 }}>{allTestCases.length}</span>
              )}
            </button>
          ))}
          <div style={{ width: 1, height: 24, background: "#e2e8f0", margin: "0 8px" }} />
          <button onClick={handleSync} disabled={syncing || processFlows.length < 1} style={{
            padding: "6px 14px", fontSize: 11, fontWeight: 600,
            background: syncing ? "#e2e8f0" : "#f0fdf4", color: syncing ? "#94a3b8" : "#16a34a",
            border: "1px solid #bbf7d0", borderRadius: 8, cursor: syncing ? "default" : "pointer",
            display: "flex", alignItems: "center", gap: 6,
          }}>
            <span style={{ display: "inline-block", animation: syncing ? "spin 1s linear infinite" : "none" }}>🔄</span>
            {syncing ? "Syncing..." : "Sync"}
            {unverifiedCount > 0 && !syncing && (
              <span style={{ fontSize: 9, padding: "1px 5px", background: "#fef3c7", color: "#d97706", borderRadius: 6, fontWeight: 700 }}>{unverifiedCount}</span>
            )}
            <style>{`@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }`}</style>
          </button>
        </div>

      {error && (

          <span>{error}</span>
          <button onClick={() => setError(null)} style={{ background: "none", border: "none", color: "#dc2626", cursor: "pointer", fontWeight: 700 }}>✕</button>
        </div>
      )}

      <div style={{ maxWidth: 1200, margin: "0 auto", padding: "28px 32px" }}>

        {/* ──── KNOWLEDGE BASE ──── */}
        {activeTab === "knowledge" && (
          <div>
            <h2 style={{ fontSize: 20, fontWeight: 700, color: "#0f172a", margin: "0 0 4px" }}>Knowledge Base</h2>
            <p style={{ fontSize: 13, color: "#64748b", margin: "0 0 24px" }}>L4 process maps are analyzed by Claude Haiku on upload. S/4HANA reference material is pre-indexed for gap detection.</p>
            <div style={{ display: "flex", gap: 20 }}>
              <UploadZone title="L4 Process Maps" description="Upload screenshots or PDFs — AI extracts steps & classifies workstream" icon="🔄" files={l4Files} onUpload={handleL4Upload} loading={l4Loading || analyzing}
                columns={[{ render: f => f.workstream }, { render: f => `${f.steps} steps` }]} />
              <UploadZone title="S/4HANA Reference" description="Module guides and release notes — pre-loaded for demo" icon="📐" files={s4Files} onUpload={handleS4Upload} loading={s4Loading}
                columns={[{ render: f => f.module }, { render: f => `${f.chunks} chunks` }]} />
            </div>
            <div style={{ marginTop: 24, background: "#fff", borderRadius: 12, border: "1px solid #e2e8f0", padding: 20 }}>
              <div style={{ fontSize: 14, fontWeight: 600, color: "#0f172a", marginBottom: 14 }}>Workstream Coverage</div>
              <div style={{ display: "flex", gap: 12 }}>
                {wsCoverage.map(w => (
                  <div key={w.ws} style={{ flex: 1, padding: "14px 16px", borderRadius: 10, textAlign: "center",

                  {Object.entries(statusConfig).map(([key, cfg]) => (

              <div style={{ display: "flex", gap: 14, marginBottom: 28 }}>
                {Object.entries(statusConfig).map(([key, cfg]) => (
                  <div key={key} style={{ background: cfg.bg, border: `1px solid ${cfg.border}`, borderRadius: 12, padding: "18px 22px", flex: 1 }}>

                      )}
                      {selectedStep.testCase && (
                        <div style={{ padding: "12px 16px", background: "#f8fafc", borderRadius: 10, border: "1px solid #e2e8f0", marginTop: 12 }}>

                      {(tc.teams || []).map(t => <span key={t} style={{ fontSize: 10, padding: "2px 8px", background: "#f1f5f9", borderRadius: 6, color: "#64748b", fontWeight: 500 }}>{t}</span>)}
                    </div>
                    <span style={{ fontSize: 10, color: "#64748b" }}>{tc.workstream}</span>
                    <span style={{ fontSize: 10, fontWeight: 600, color: srcCfg.color }}>{srcCfg.label}</span>
                  </div>
                );
              })}
            </div>
            <div style={{ marginTop: 20, padding: "20px 24px", background: "#eef2ff", borderRadius: 12, border: "1px solid #c7d2fe", display: "flex", gap: 16, alignItems: "flex-start" }}>
              <span style={{ fontSize: 24 }}>🎯</span>
              <div>
                <div style={{ fontSize: 14, fontWeight: 600, color: "#3730a3", marginBottom: 4 }}>DIL Integration</div>
                <div style={{ fontSize: 13, color: "#4338ca", lineHeight: 1.6 }}>These cross-functional test cases map directly to Day-in-the-Life (DIL) testing scenarios. Each test requires multiple workstream teams present simultaneously — the exact coordination gap that causes go-live failures when teams test in isolation. ProcessLens automates the diagnostic that was previously done manually across 25-person cross-functional teams.</div>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
