  },
];

// ─── COMPONENTS ───
function Badge({ label, color, bg }) {
  return <span style={{ fontSize: 10, fontWeight: 600, padding: "3px 10px", borderRadius: 10, background: bg || `${color}15`, color, border: `1px solid ${color}30`, whiteSpace: "nowrap" }}>{label}</span>;
}

function Card({ children, style }) {
  return <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #e2e8f0", padding: 20, marginBottom: 16, ...style }}>{children}</div>;
}

function SectionHeader({ title, count }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
      <div style={{ fontSize: 15, fontWeight: 700, color: "#0f172a" }}>{title}</div>
      {count !== undefined && <span style={{ fontSize: 11, fontWeight: 600, padding: "2px 8px", background: "#f1f5f9", borderRadius: 8, color: "#64748b" }}>{count}</span>}
    </div>
  );
}

// ─── MAIN APP ───

      responsibilities: [

        { role: "Supervisor", duties: "Ensure SOP compliance, manage escalations" },
        { role: "QA Inspector", duties: "Perform quality hold decisions as required" },

      equipment: ["RF handheld scanner", "PPE: Steel-toe boots, high-vis vest", `${formData.system} transaction access`],
      safety: formData.safety ? formData.safety.split("\n").filter(l => l.trim()) : ["All personnel must wear required PPE"],
      procedures: stepLines.length > 0 ? stepLines.map((line, i) => ({
        id: i + 1, step: line.trim(), description: `[AI-generated description pending SME review] Execute ${line.trim().toLowerCase()} per ${formData.system} standard workflow. Verify completion before proceeding.`,
        regulatoryRef: formData.regulatory.split(",")[0]?.trim() || "GxP", changeType: null, isNew: true,
      })) : [{ id: 1, step: "Step 1 — Pending Definition", description: "Process steps to be defined by SME.", regulatoryRef: "GxP", changeType: null, isNew: true }],
      qualityChecks: [{ id: 1, checkpoint: "Process completion verification", frequency: "Per execution", criteria: "100% compliance with procedural steps", regulatoryRef: formData.regulatory.split(",")[0]?.trim() || "GxP" }],
      trainingImpact: [{ role: "Warehouse Associate", reason: "New SOP — initial training required", required: true }],
      diffs: [],
      auditTrail: [{ timestamp: new Date().toISOString().replace("T", " ").slice(0, 16), user: "AI — Claude Haiku", action: "Generated initial SOP draft", detail: `${stepLines.length || 1} steps, 1 quality check. Regulatory context: ${formData.regulatory}` }],
    };
    setSops(prev => [newSop, ...prev]);
    setGenerating(false);
    setFormData({ processName: "", workstream: "EWM", steps: "", safety: "", regulatory: "GxP, DSCSA", system: "SAP EWM" });
    openSop(newDocId);
  }, [formData, sops.length]);

  const updateSop = useCallback((docId, updater) => {

  }, []);

  const addAudit = useCallback((docId, user, action, detail) => {
    updateSop(docId, s => ({ ...s, auditTrail: [...s.auditTrail, { timestamp: new Date().toISOString().replace("T", " ").slice(0, 16), user, action, detail }] }));
  }, [updateSop]);

  const handleEdit = (stepId, newText) => {
    updateSop(activeSopId, s => ({ ...s, procedures: s.procedures.map(p => p.id === stepId ? { ...p, description: newText } : p) }));
    addAudit(activeSopId, "J. Martinez (SME)", `Edited Step ${stepId}`, "Updated procedural text");
    setEditingStep(null);
  };

  const handleSubmitPO = () => { updateSop(activeSopId, s => ({ ...s, status: "po-approval" })); addAudit(activeSopId, "J. Martinez (SME)", "Submitted for Process Owner review", "SME review complete"); };

  const handleReject = () => { updateSop(activeSopId, s => ({ ...s, status: "sme-review" })); addAudit(activeSopId, "Dr. S. Chen (Process Owner)", "RETURNED to SME", "Requested revisions"); };

                      <option>SAP EWM</option><option>SAP S/4HANA PP</option><option>SAP S/4HANA FI</option><option>SAP WM (Legacy)</option><option>Manual / Paper-based</option><option>Other WMS</option>

              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginTop: 16 }}>
                <div>
                  <label style={{ fontSize: 12, fontWeight: 600, color: "#334155", display: "block", marginBottom: 6 }}>Safety Considerations</label>
                  <textarea value={formData.safety} onChange={e => setFormData(p => ({ ...p, safety: e.target.value }))} rows={3} placeholder={"PPE requirements\nMax pallet stack height\nCold chain timing constraints\nEquipment certification requirements"} style={{ width: "100%", padding: "10px 14px", border: "1px solid #cbd5e1", borderRadius: 8, fontSize: 13, fontFamily: "inherit", resize: "vertical", boxSizing: "border-box" }} />

                          <textarea value={editText} onChange={e => setEditText(e.target.value)} rows={3} style={{ width: "100%", padding: 8, border: "1px solid #0f766e", borderRadius: 8, fontSize: 12, fontFamily: "inherit", boxSizing: "border-box" }} />
                          <div style={{ display: "flex", gap: 8, marginTop: 6 }}>
                            <button onClick={() => handleEdit(p.id, editText)} style={{ padding: "4px 12px", fontSize: 11, background: "#0f766e", color: "#fff", border: "none", borderRadius: 6, cursor: "pointer", fontWeight: 600 }}>Save</button>
                            <button onClick={() => setEditingStep(null)} style={{ padding: "4px 12px", fontSize: 11, background: "#f1f5f9", color: "#64748b", border: "none", borderRadius: 6, cursor: "pointer" }}>Cancel</button>
                          </div>
                        </div>
                      ) : (
                        <div style={{ marginLeft: 34, display: "flex", gap: 10 }}>
                          <p style={{ fontSize: 12, color: "#475569", lineHeight: 1.7, margin: 0, flex: 1 }}>{p.description}</p>
                          {sop.status === "sme-review" && <button onClick={() => { setEditingStep(p.id); setEditText(p.description); }} style={{ fontSize: 10, color: "#0f766e", background: "none", border: "none", cursor: "pointer", textDecoration: "underline", flexShrink: 0 }}>Edit</button>}
                        </div>
                      )}
                    </div>
                  );
                })}
              </Card>

              <Card>
                <SectionHeader title="Quality Checks" count={sop.qualityChecks.length} />
                {sop.qualityChecks.map(qc => (
                  <div key={qc.id} style={{ display: "flex", gap: 14, padding: "10px 0", borderTop: qc.id > 1 ? "1px solid #f8fafc" : "none", alignItems: "flex-start" }}>
                    <span style={{ fontSize: 12, fontWeight: 600, color: "#0f766e", width: 24 }}>{qc.id}</span>
                    <span style={{ fontSize: 12, color: "#334155", fontWeight: 500, flex: 1 }}>{qc.checkpoint}</span>
                    <span style={{ fontSize: 11, color: "#64748b", width: 130 }}>{qc.frequency}</span>
                    <span style={{ fontSize: 11, color: "#475569", flex: 1 }}>{qc.criteria}</span>
                    <span style={{ fontSize: 10, color: "#4f46e5", fontWeight: 500, width: 110, textAlign: "right" }}>{qc.regulatoryRef}</span>
                  </div>
                ))}
              </Card>

              <Card style={{ border: "1px solid #fde68a", background: "#fffdf7" }}>
                <SectionHeader title="Training Impact" count={`${sop.trainingImpact.filter(t => t.required).length} roles require retraining`} />
                {sop.trainingImpact.map((t, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 12, padding: "8px 0", borderTop: i > 0 ? "1px solid #fef3c7" : "none" }}>
                    <span style={{ width: 20, height: 20, borderRadius: 6, background: t.required ? "#fef2f2" : "#f0fdf4", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 700, color: t.required ? "#dc2626" : "#16a34a" }}>{t.required ? "!" : "✓"}</span>
                    <span style={{ fontSize: 12, fontWeight: 600, color: "#334155", minWidth: 160 }}>{t.role}</span>
                    <span style={{ fontSize: 12, color: "#64748b", flex: 1 }}>{t.reason}</span>
                    <Badge label={t.required ? "Required" : "Awareness"} color={t.required ? "#dc2626" : "#16a34a"} bg={t.required ? "#fef2f2" : "#f0fdf4"} />
                  </div>
                ))}
              </Card>
            </>)}

            {/* ──── COMPARE TAB ──── */}
            {activeTab === "compare" && (<>
              <div style={{ marginBottom: 24 }}>
                <h2 style={{ fontSize: 20, fontWeight: 700, color: "#0f172a", margin: "0 0 4px" }}>Differential Analysis</h2>
                <p style={{ fontSize: 13, color: "#64748b", margin: 0 }}>{sop.docId} Rev {sop.priorRevision || "N/A"} → Rev {sop.revision} · {sop.diffs.length} change{sop.diffs.length !== 1 ? "s" : ""} detected</p>
              </div>
              {sop.diffs.length === 0 ? (
                <Card style={{ textAlign: "center", padding: 40 }}>
                  <div style={{ fontSize: 28, marginBottom: 8 }}>✓</div>
                  <div style={{ fontSize: 14, fontWeight: 500, color: "#64748b" }}>New document — no prior version to compare</div>
                </Card>
              ) : sop.diffs.map((diff, i) => {
                const ct = CHANGE_TYPES[diff.type];
                return (
                  <Card key={i}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
                      <span style={{ fontSize: 12, fontWeight: 700, color: "#334155" }}>Step {diff.step}</span>
                      <Badge label={ct.label} color={ct.color} bg={ct.bg} />
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
                      <div style={{ padding: "12px 16px", background: "#fef2f2", borderRadius: 8, borderLeft: "3px solid #fca5a5" }}>
                        <div style={{ fontSize: 10, fontWeight: 600, color: "#dc2626", marginBottom: 6, letterSpacing: 0.5 }}>OLD — Rev {sop.priorRevision}</div>
                        <div style={{ fontSize: 12, color: "#7f1d1d", lineHeight: 1.6 }}>{diff.old}</div>
                      </div>
                      <div style={{ padding: "12px 16px", background: "#f0fdf4", borderRadius: 8, borderLeft: "3px solid #86efac" }}>
                        <div style={{ fontSize: 10, fontWeight: 600, color: "#16a34a", marginBottom: 6, letterSpacing: 0.5 }}>NEW — Rev {sop.revision}</div>
                        <div style={{ fontSize: 12, color: "#14532d", lineHeight: 1.6 }}>{diff.new}</div>
                      </div>
                    </div>
                    <div style={{ marginTop: 10, fontSize: 12, color: "#64748b", fontStyle: "italic" }}>Impact: {diff.impact}</div>
                  </Card>
                );
              })}
            </>)}

            {/* ──── AUDIT TRAIL TAB ──── */}
            {activeTab === "audit" && (<>
              <h2 style={{ fontSize: 20, fontWeight: 700, color: "#0f172a", margin: "0 0 4px" }}>Audit Trail</h2>
              <p style={{ fontSize: 13, color: "#64748b", margin: "0 0 24px" }}>{sop.docId} · ALCOA+ compliant — all actions timestamped and attributed</p>
              <Card>
                {[...sop.auditTrail].reverse().map((entry, i) => {
                  const isAI = entry.user.includes("AI");
                  const isApproval = entry.action.includes("APPROVED");
                  const isReject = entry.action.includes("RETURNED");
                  return (
                    <div key={i} style={{ display: "grid", gridTemplateColumns: "140px 180px 1fr", gap: 8, padding: "12px 0", borderBottom: i < sop.auditTrail.length - 1 ? "1px solid #f8fafc" : "none", background: isApproval ? "#f0fdf418" : isReject ? "#fef2f218" : "transparent" }}>
                      <span style={{ fontSize: 11, color: "#94a3b8", fontFamily: "monospace" }}>{entry.timestamp}</span>
                      <span style={{ fontSize: 12, fontWeight: 500, color: isAI ? "#7c3aed" : "#334155" }}>{entry.user}</span>
                      <div>
                        <div style={{ fontSize: 12, color: "#0f172a", fontWeight: 500 }}>{entry.action}</div>
                        <div style={{ fontSize: 11, color: "#64748b", marginTop: 2 }}>{entry.detail}</div>
                      </div>
                    </div>
                  );
                })}
              </Card>
            </>)}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
